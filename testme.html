<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('bgaphoa.jpg');
      background-size: cover; /* Ensures the image covers the entire background */
      background-repeat: no-repeat; /* Prevents the image from repeating */
      background-position: center center; /* Centers the image */
      margin: 0; /* Remove default margin */
      padding: 0; /* Remove default padding */
      display: flex;
      flex-direction: column; /* Column direction to allow footer positioning */
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      max-width: 350px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3); /* Semi-transparent border */
      border-radius: 30px;
      background-color: rgba(249, 249, 249, 0.3); /* Semi-transparent background */
      text-align: center;
    }

    .create-account-form {
      padding: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: #333;
      font-family: Arial, sans-serif;
    }

    .form-control {
      width: 100%;
      height: 40px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      font-family: Arial, sans-serif;
    }

    .btn {
      width: 100%;
      height: 40px;
      padding: 10px;
      font-size: 16px;
      background-color: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .btn:hover {
      background-color: #3e8e41;
    }

    /* Eye toggle styles */
    .eye-toggle {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-fdEtGx6D0TVgjFmKkZPmtll3xblKJw2P4JHBP3DMH8Oy5PYmBNzPMJX+Q2XmOmjXTW+Dc4v/HyYoc3MS0a36zg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="container">
    <div class="create-account-form">
      <h2>Create Account</h2>
      <form>
        <div class="form-group">
          <label for="membershipNO">Membership No.</label>
          <input type="text" id="username" class="form-control" placeholder="Enter membership no.">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" class="form-control" placeholder="Enter password">
            <span toggle="#password" class="eye-toggle fas fa-eye-slash" onclick="togglePasswordVisibility(this)"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-field">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password">
            <span toggle="#confirmPassword" class="eye-toggle fas fa-eye-slash" onclick="togglePasswordVisibility(this)"></span>
          </div>
        </div>
        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    function togglePasswordVisibility(icon) {
      const password = document.querySelector(icon.getAttribute('toggle'));
      if (password.type === 'password') {
        password.type = 'text';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      } else {
        password.type = 'password';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      }
    }
  </script>
</body>
</html>
